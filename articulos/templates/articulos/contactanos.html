{% extends 'articulos/base.html' %}
{% load i18n %}
{% block title %}{% trans "Contáctanos - KAFE KEAN" %}{% endblock %}
{% block content %}
<div class="container form-shell">
    <h1>{% trans "Contáctanos" %}</h1>
    <form method="post" class="form-card">
        {% csrf_token %}
        <label>{% trans "Nombre" %}<input class="form-control" name="nombre" required></label>
        <label>{% trans "Email" %}<input class="form-control" name="email" type="email" required></label>
        <label>{% trans "Mensaje" %}<textarea class="form-control" name="mensaje" rows="5" required></textarea></label>
        <button class="btn btn-primary" type="submit">{% trans "Enviar" %}</button>
    </form>
</div>
{% endblock %}
