{% extends 'articulos/base.html' %}
{% load i18n %}
{% block title %}{% trans "Iniciar Sesión - KAFE KEAN" %}{% endblock %}
{% block content %}
<div class="container auth-shell">
    <section class="auth-panel">
        <h1>{% trans "Iniciar Sesión" %}</h1>
        <form method="post" class="form-card">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary auth-submit">{% trans "Entrar" %}</button>
        </form>
        <div class="section-links">
            <a class="btn btn-outline-primary" href="{% url 'articulos:registro' %}">{% trans "Crear Cuenta" %}</a>
            <a class="btn btn-outline-primary" href="{% url 'articulos:password_reset' %}">{% trans "Recuperar Contraseña" %}</a>
        </div>
    </section>
</div>
{% endblock %}
