{% extends 'articulos/base.html' %}
{% load i18n %}
{% block title %}{% trans "Registro - KAFE KEAN" %}{% endblock %}
{% block content %}
<div class="container auth-shell">
    <section class="auth-panel">
        <h1>{% trans "Crear Cuenta" %}</h1>
        <form method="post" class="form-card">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary auth-submit">{% trans "Registrarme" %}</button>
        </form>
    </section>
</div>
{% endblock %}
