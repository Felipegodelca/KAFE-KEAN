{% extends 'articulos/base.html' %}
{% load i18n %}
{% block title %}{% trans "Editar Artículo - KAFE KEAN" %}{% endblock %}
{% block content %}
<div class="container form-shell">
    <h1>{% trans "Editar Artículo" %}</h1>
    <form method="post" enctype="multipart/form-data" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="button-row">
            <button type="submit" class="btn btn-primary">{% trans "Actualizar" %}</button>
            <a href="{% url 'articulos:detalle_articulo' articulo.slug %}" class="btn btn-outline-primary">{% trans "Cancelar" %}</a>
        </div>
    </form>
</div>
{% endblock %}
